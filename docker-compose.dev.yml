name: hardwaretech-catalog

services:
  frontend-catalog:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: frontend-catalog
    ports:
      - "3001:80"
    environment:
      - NODE_ENV=development
    restart: unless-stopped
    networks:
      hardwaretech-network:
        aliases:
          - frontend-catalog
    healthcheck:
      test: ["CMD", "wget", "--spider", "http://localhost:80/health"]
      interval: 30s
      timeout: 10s
      retries: 3

networks:
  hardwaretech-network:
    external: true